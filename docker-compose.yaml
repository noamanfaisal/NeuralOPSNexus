services:
  # NUCLEUS: The Orchestrator (Auth, Projects, Chat-Server)
  nucleus:
    build:
      context: ./apps/nucleus
    container_name: nexus-nucleus
    ports:
      - "8000:8000"
    volumes:
      - ./apps/nucleus:/nucleus
    environment:
      - POSTGRES_URL=${POSTGRES_URL}
      - NEXUS_AI_URL=${NEXUS_AI_URL}
      - CENTRIFUGO_API_URL=${CENTRIFUGO_API_URL}
      - CENTRIFUGO_API_KEY=${CENTRIFUGO_API_KEY}
      - CENTRIFUGO_HMAC_SECRET=${CENTRIFUGO_HMAC_SECRET}
      - PYTHONPATH=/nucleus
    networks:
      - nexus-network
    depends_on:
      - postgres
      - realtime
    working_dir: /nucleus
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--proxy-headers"]

  # NEXUS-AI: The Worker (LiteLLM, Vector Search, RAG)
  nexus-ai:
    build:
      context: ./apps/nexus-ai
    container_name: nexus-ai
    environment:
      - CHROMA_HOST=${CHROMA_HOST}
      - CHROMA_PORT=${CHROMA_PORT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MODEL_NAME=${MODEL_NAME}
    networks:
      - nexus-network
    depends_on:
      - chromadb
    working_dir: /app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  # REALTIME: The Transport Layer (Centrifugo)
  realtime:
    image: nexus-transport:1.0
    container_name: nexus-transport
    ports:
      - "8002:8000"
    environment:
      - CENTRIFUGO_TOKEN_HMAC_SECRET=${CENTRIFUGO_HMAC_SECRET}
      - CENTRIFUGO_HTTP_API_KEY=${CENTRIFUGO_API_KEY}
    command: >
      nexus-transport 
      --admin.enabled 
      --admin.insecure
    networks:
      - nexus-network

  # CHROMADB: Vector Storage
  chromadb:
    image: chromadb/chroma:latest
    container_name: nexus-chroma
    volumes:
      - ./chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - nexus-network

  # POSTGRES: Relational Storage
  postgres:
    image: postgres:16-alpine
    container_name: nexus-postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - nexus-network

networks:
  nexus-network:
    driver: bridge